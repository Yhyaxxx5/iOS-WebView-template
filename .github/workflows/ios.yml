name: iOS Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List projects
        run: ls

      - name: Build app
        run: |
          xcodebuild clean build \
          -project "Go Guide.xcodeproj" \
          -scheme "Go Guide" \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO
