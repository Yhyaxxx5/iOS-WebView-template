name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Resolve Swift Packages
        run: |
          xcodebuild -resolvePackageDependencies -project "Go Guide.xcodeproj" -scheme "Go Guide"

      - name: Build Xcode Project
        run: |
          mkdir -p build
          xcodebuild archive \
            -project "Go Guide.xcodeproj" \
            -scheme "Go Guide" \
            -sdk iphoneos \
            -archivePath build/GoGuide.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Export App Artifact
        run: |
          mkdir -p build/Artifact
          cp -r build/GoGuide.xcarchive/Products/Applications/*.app build/Artifact/ || true

      - name: Upload App File
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-file
          path: build/Artifact/
