name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Resolve Swift Packages
        run: |
          xcodebuild -resolvePackageDependencies -project "Go Guide.xcodeproj"

      - name: Build Xcode Project (Auto Detect Scheme)
        run: |
          mkdir -p build
          # العثور على أول scheme متاح وبناء المشروع من خلاله تلقائياً
          SCHEME=$(xcodebuild -list -project "Go Guide.xcodeproj" | awk '/Schemes:/{flag=1;next} /^$/{flag=0} flag' | sed 's/^[[:space:]]*//' | head -n 1)
          echo "Detected Scheme: $SCHEME"
          
          xcodebuild archive \
            -project "Go Guide.xcodeproj" \
            -scheme "$SCHEME" \
            -sdk iphoneos \
            -archivePath build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Export App Artifact
        run: |
          mkdir -p build/Artifact
          cp -r build/App.xcarchive/Products/Applications/*.app build/Artifact/ || true

      - name: Upload App File
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-file
          path: build/Artifact/
