name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Resolve Swift Packages
        run: xcodebuild -resolvePackageDependencies -project "Go Guide.xcodeproj"

      - name: Build and Archive Project
        run: |
          mkdir -p build
          xcodebuild archive \
            -project "GoGuide.xcodeproj" \
            -scheme "GoGuide" \
            -sdk iphoneos \
            -archivePath "build/GoGuide.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Export App Folder
        run: |
          mkdir -p build/Artifact
          if [ -d "build/GoGuide.xcarchive/Products/Applications" ]; then
            cp -r build/GoGuide.xcarchive/Products/Applications/*.app build/Artifact/
          else
            find build -name "*.app" -exec cp -r {} build/Artifact/ \;
          fi

      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-file
          path: build/Artifact/
